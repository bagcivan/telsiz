<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garantili Manuel Telsiz</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 15px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; }
        textarea { width: 100%; height: 100px; background: #000; color: #0f0; border: 1px solid #333; font-size: 10px; margin: 10px 0; border-radius: 5px; }
        button { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-blue { background: #007bff; color: white; }
        .btn-green { background: #28a745; color: white; }
        .status { color: #ffc107; font-size: 14px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>📟 Manuel Telsiz</h2>
    <div id="status" class="status">Mikrofon bekleniyor...</div>
    <button onclick="startMic()" id="micBtn" class="btn-blue">1. Mikrofonu Aç</button>

    <div id="main" style="display:none;">
        <hr>
        <h3>A Cihazı (Başlatan)</h3>
        <button onclick="createOffer()" class="btn-blue">2. Teklif Kodu Oluştur</button>
        
        <h3>B Cihazı (Yanıtlayan)</h3>
        <p style="font-size:12px">Karşıdan gelen kodu buraya yapıştır:</p>
        <textarea id="incomingCode" placeholder="Kodu buraya yapıştırın..."></textarea>
        <button onclick="processIncoming()" class="btn-green">3. Kodu İşle / Yanıtla</button>
        
        <hr>
        <p style="font-size:12px">Senin Kodun (Bunu karşıya gönder):</p>
        <textarea id="outgoingCode" readonly onclick="this.select()"></textarea>
        <button onclick="copyCode()" style="background:#444; color:white;">Kodu Kopyala</button>
    </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<script>
    let pc, stream;
    const status = document.getElementById('status');
    const incoming = document.getElementById('incomingCode');
    const outgoing = document.getElementById('outgoingCode');

    async function startMic() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            status.innerText = "Sistem Hazır! ✅";
            document.getElementById('main').style.display = "block";
            document.getElementById('micBtn').style.display = "none";
        } catch (e) { status.innerText = "Mikrofon hatası!"; }
    }

    function initPC() {
        if (pc) return;
        pc = new RTCPeerConnection({ iceServers: [] });
        stream.getTracks().forEach(t => pc.addTrack(t, stream));
        pc.ontrack = e => {
            document.getElementById('remoteAudio').srcObject = e.streams[0];
            status.innerText = "BAĞLANDI! 🎙️⚡";
        };
    }

    async function createOffer() {
        initPC();
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        // ICE adaylarını beklemeden direkt metni veriyoruz (Local ağda %90 çalışır)
        setTimeout(() => {
            outgoing.value = btoa(pc.localDescription.sdp); // Base64 ile kısaltıyoruz
            status.innerText = "Teklif Hazır! Kopyalayıp B'ye gönder.";
        }, 1000);
    }

    async function processIncoming() {
        const raw = incoming.value.trim();
        if(!raw) return;
        const decodedSDP = atob(raw);
        initPC();

        if (pc.signalingState === "stable") {
            // Bu bir TEKLİF (A'dan B'ye)
            await pc.setRemoteDescription(new RTCSessionDescription({type: "offer", sdp: decodedSDP}));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            setTimeout(() => {
                outgoing.value = btoa(pc.localDescription.sdp);
                status.innerText = "Yanıt oluşturuldu! Kopyalayıp A'ya geri gönder.";
            }, 1000);
        } else {
            // Bu bir YANIT (B'den A'ya geri dönüş)
            await pc.setRemoteDescription(new RTCSessionDescription({type: "answer", sdp: decodedSDP}));
            status.innerText = "Eşleşme tamamlandı!";
        }
    }

    function copyCode() {
        outgoing.select();
        document.execCommand("copy");
        alert("Kod kopyalandı!");
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Interkom - Serverless</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 5px; }
        p { font-size: 14px; color: #5f6368; text-align: center; }
        .section { border-top: 1px solid #eee; margin-top: 20px; padding-top: 20px; }
        button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-prime { background: #1a73e8; color: white; }
        .btn-scan { background: #34a853; color: white; }
        .btn-prime:disabled { background: #ccc; }
        #qrcode { display: flex; justify-content: center; margin: 15px 0; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-top: 15px; display: none; }
        #status { text-align: center; font-weight: bold; margin-top: 15px; color: #f4b400; }
        textarea { width: 100%; height: 60px; margin-top: 10px; font-size: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>📡 QR Ses Aktarımı</h2>
    <p>Aynı ağdaki iki telefon arasında gecikmesiz ses.</p>
    
    <div id="status">Lütfen mikrofonu açın</div>
    <button id="startBtn" class="btn-prime">1. Mikrofonu Etkinleştir</button>

    <div class="section" id="mainSection" style="display:none;">
        <button id="makeOfferBtn" class="btn-prime">2. Teklif Oluştur (A Cihazı)</button>
        <div id="qrcode"></div>

        <button id="startScanBtn" class="btn-scan">3. QR Kod Tara (B Cihazı)</button>
        <div id="reader"></div>
    </div>

    <audio id="remoteAudio" autoplay controls style="display:none;"></audio>
    <textarea id="sdpBox"></textarea>
</div>

<script>
    let localStream;
    let peerConnection;
    const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
    
    const sdpBox = document.getElementById('sdpBox');
    const status = document.getElementById('status');
    const qrcodeDiv = document.getElementById('qrcode');
    const readerDiv = document.getElementById('reader');

    // 1. Mikrofon Erişimi
    document.getElementById('startBtn').onclick = async () => {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            status.innerText = "Mikrofon Hazır! ✅";
            document.getElementById('mainSection').style.display = "block";
            document.getElementById('startBtn').style.display = "none";
        } catch (e) {
            status.innerText = "Hata: Mikrofon izni alınamadı.";
        }
    };

    function initPeer() {
        peerConnection = new RTCPeerConnection(config);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        
        peerConnection.ontrack = (event) => {
            document.getElementById('remoteAudio').srcObject = event.streams[0];
            status.innerText = "BAĞLANDI! 🎙️";
            status.style.color = "green";
        };
    }

    // A CİHAZI: TEKLİF OLUŞTUR VE QR GÖSTER
    document.getElementById('makeOfferBtn').onclick = async () => {
        initPeer();
        status.innerText = "Teklif hazırlanıyor...";
        
        peerConnection.onicecandidate = (e) => {
            if (!e.candidate) {
                qrcodeDiv.innerHTML = "";
                const sdp = JSON.stringify(peerConnection.localDescription);
                new QRCode(qrcodeDiv, { text: sdp, width: 256, height: 256 });
                status.innerText = "QR Oluşturuldu! B cihazına taratın.";
            }
        };

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
    };

    // B CİHAZI: TARAYICIYI AÇ VE YANITLA
    document.getElementById('startScanBtn').onclick = () => {
        readerDiv.style.display = "block";
        const html5QrCode = new Html5Qrcode("reader");
        
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: 250 },
            async (decodedText) => {
                await html5QrCode.stop();
                readerDiv.style.display = "none";
                handleScannedData(decodedText);
            }
        ).catch(err => status.innerText = "Kamera hatası: " + err);
    };

    async function handleScannedData(data) {
        const signal = JSON.parse(data);

        if (signal.type === "offer") {
            // B Cihazı Teklifi Aldı
            initPeer();
            await peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            peerConnection.onicecandidate = (e) => {
                if (!e.candidate) {
                    qrcodeDiv.innerHTML = "";
                    const sdp = JSON.stringify(peerConnection.localDescription);
                    new QRCode(qrcodeDiv, { text: sdp, width: 256, height: 256 });
                    status.innerText = "Yanıt QR hazır! A cihazına geri taratın.";
                }
            };
        } else if (signal.type === "answer") {
            // A Cihazı Yanıtı Aldı
            await peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
            status.innerText = "Eşleşme Tamamlanıyor...";
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gecikmesiz Yerel İnterkom (Diyet SDP)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .btn-mic { background: #1a73e8; color: white; }
        .btn-offer { background: #e91e63; color: white; }
        .btn-scan { background: #4caf50; color: white; }
        #status { margin: 15px 0; font-weight: bold; color: #555; border: 1px solid #ddd; padding: 10px; border-radius: 5px; min-height: 20px;}
        #qrcode { display: flex; justify-content: center; margin: 15px 0; }
        #reader { width: 100%; border-radius: 8px; margin-top: 10px; display: none; }
        audio { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>📡 Yerel İnterkom</h2>
    <div id="status">Lütfen mikrofonu açın</div>
    
    <button id="startBtn" class="btn-mic">1. Mikrofonu Başlat</button>

    <div id="controls" style="display:none;">
        <button id="offerBtn" class="btn-offer">2. Teklif QR Oluştur (A Cihazı)</button>
        <button id="scanBtn" class="btn-scan">3. QR Kod Tara (B Cihazı)</button>
        <div id="qrcode"></div>
        <div id="reader"></div>
    </div>

    <audio id="remoteAudio" autoplay></audio>
</div>

<script>
    let localStream;
    let peerConnection;
    const pcConfig = { iceServers: [] }; 

    const status = document.getElementById('status');
    const qrcodeDiv = document.getElementById('qrcode');
    const readerDiv = document.getElementById('reader');

    // 1. Mikrofonu Aç
    document.getElementById('startBtn').onclick = async () => {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            status.innerText = "Mikrofon Aktif ✅";
            document.getElementById('controls').style.display = "block";
            document.getElementById('startBtn').style.display = "none";
        } catch (e) {
            status.innerText = "Hata: Mikrofon izni gerekiyor (HTTPS)!";
        }
    };

    // SDP DİYETİ: Gereksiz satırları temizleyen fonksiyon
    function shrinkSDP(sdp) {
        return sdp.split('\n')
            .filter(line => 
                line.indexOf('a=fmtp') === -1 && 
                line.indexOf('a=rtcp-fb') === -1 && 
                line.indexOf('a=extmap') === -1 && 
                line.indexOf('a=msid') === -1 &&
                line.indexOf('a=ssrc') === -1
            ).join('\n');
    }

    function initPeer() {
        if (peerConnection) return;
        peerConnection = new RTCPeerConnection(pcConfig);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        peerConnection.ontrack = (e) => {
            document.getElementById('remoteAudio').srcObject = e.streams[0];
            status.innerText = "SES BAĞLANDI! 🎙️⚡";
            status.style.color = "green";
        };
    }

    function makeQR(data) {
        qrcodeDiv.innerHTML = "";
        // SDP'yi temizle (Diyet yap)
        const smallSDP = shrinkSDP(data);
        new QRCode(qrcodeDiv, {
            text: smallSDP,
            width: 250,
            height: 250,
            correctLevel: QRCode.CorrectLevel.L 
        });
    }

    document.getElementById('offerBtn').onclick = async () => {
        initPeer();
        status.innerText = "QR Hazırlanıyor...";
        
        peerConnection.onicecandidate = (e) => {
            if (!e.candidate) {
                makeQR(JSON.stringify(peerConnection.localDescription));
                status.innerText = "Teklif QR Hazır! B'ye taratın.";
            }
        };

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        
        // Aday toplanmazsa 1.5 sn sonra zorla oluştur
        setTimeout(() => {
            if (qrcodeDiv.innerHTML === "") {
                makeQR(JSON.stringify(peerConnection.localDescription));
                status.innerText = "Teklif QR (Hızlı) Hazır!";
            }
        }, 1500);
    };

    document.getElementById('scanBtn').onclick = () => {
        readerDiv.style.display = "block";
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
            async (text) => {
                await scanner.stop();
                readerDiv.style.display = "none";
                processSignal(JSON.parse(text));
            }
        ).catch(err => status.innerText = "Kamera hatası!");
    };

    async function processSignal(signal) {
        initPeer();
        if (signal.type === "offer") {
            status.innerText = "Teklif alındı, yanıt hazırlanıyor...";
            await peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            peerConnection.onicecandidate = (e) => {
                if (!e.candidate) {
                    makeQR(JSON.stringify(peerConnection.localDescription));
                    status.innerText = "Yanıt QR Hazır! A'ya geri taratın.";
                }
            };
            setTimeout(() => {
                if (qrcodeDiv.innerHTML === "") {
                    makeQR(JSON.stringify(peerConnection.localDescription));
                    status.innerText = "Yanıt QR (Hızlı) Hazır!";
                }
            }, 1500);

        } else if (signal.type === "answer") {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
            status.innerText = "Eşleşme tamamlandı!";
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garantili Bas-Konuş Telsiz</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; text-align: center; margin: 0; padding: 15px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-top: 10px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .status-box { padding: 10px; margin-bottom: 10px; border-radius: 10px; background: #222; font-size: 14px; border-left: 5px solid #555; }
        .status-online { border-left-color: #00e676; color: #00e676; }
        .status-tx { border-left-color: #ff1744; color: #ff1744; }

        button { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-setup { background: #1a73e8; color: white; }
        .btn-answer { background: #fbbc05; color: black; }
        
        /* PTT Butonu */
        #ptt-button { 
            height: 220px; width: 220px; border-radius: 50%; margin: 30px auto; 
            background: #222; border: 10px solid #333; color: #555; 
            font-size: 22px; display: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: 0.2s;
        }
        #ptt-button.active { 
            background: #ff1744; border-color: #b71c1c; color: white; box-shadow: 0 0 30px rgba(255,23,68,0.5);
        }

        #setup-area, #telsiz-area { display: none; }
        label { display: block; background: #444; padding: 15px; border-radius: 12px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        input[type="file"] { display: none; }
        hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>📡 Telsiz Sistemi</h2>
    <div id="status-display" class="status-box">Sistemi Başlatın</div>

    <button id="startBtn" class="btn-setup">1. Mikrofonu ve Sistemi Başlat</button>

    <div id="setup-area">
        <hr>
        <p style="font-size:12px; color:#aaa;">Adım A: Başlatıcı iseniz tıklayın</p>
        <button id="offerBtn" class="btn-setup">TEKLİF DOSYASI OLUŞTUR (EXPORT)</button>
        
        <hr>
        <p style="font-size:12px; color:#aaa;">Adım B: Diğer cihazdan gelen dosyayı seçin</p>
        <label for="importFile">📁 DOSYA İÇE AKTAR (IMPORT)</label>
        <input type="file" id="importFile" accept=".txt">
        
        <div id="answerBtnArea" style="display:none;">
            <p style="font-size:12px; color:#fbbc05;">Teklif yüklendi! Yanıt oluşturun:</p>
            <button id="createAnswerBtn" class="btn-answer">YANIT DOSYASI OLUŞTUR (EXPORT)</button>
        </div>
    </div>

    <div id="telsiz-area">
        <button id="ptt-button">BAS KONUŞ</button>
        <p style="color: #666;">Dinlemedesiniz. Konuşmak için basılı tutun.</p>
    </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<script>
    let pc, stream, localTrack;
    const statusDisplay = document.getElementById('status-display');
    const pttButton = document.getElementById('ptt-button');

    // 1. MİKROFONU HAZIRLA
    document.getElementById('startBtn').onclick = async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localTrack = stream.getAudioTracks()[0];
            localTrack.enabled = false; // Başlangıçta ses kapalı
            
            document.getElementById('setup-area').style.display = "block";
            document.getElementById('startBtn').style.display = "none";
            statusDisplay.innerText = "Bağlantı Kurulumu Bekleniyor...";
        } catch (e) { alert("Mikrofon izni verilmedi!"); }
    };

    function initPC() {
        if (pc) return;
        pc = new RTCPeerConnection({ iceServers: [] });
        stream.getTracks().forEach(t => pc.addTrack(t, stream));
        
        pc.ontrack = e => {
            document.getElementById('remoteAudio').srcObject = e.streams[0];
            statusDisplay.innerText = "Ses Kanalı Açıldı ✅";
        };

        pc.oniceconnectionstatechange = () => {
            if (pc.iceConnectionState === "connected" || pc.iceConnectionState === "completed") {
                switchToTelsiz();
            }
        };
    }

    function switchToTelsiz() {
        document.getElementById('setup-area').style.display = "none";
        document.getElementById('telsiz-area').style.display = "block";
        pttButton.style.display = "block";
        statusDisplay.innerText = "BAĞLI - DİNLEMEDE";
        statusDisplay.className = "status-box status-online";
    }

    function download(filename, sdp) {
        const data = JSON.stringify({t: pc.localDescription.type, s: btoa(sdp)});
        const blob = new Blob([data], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
    }

    // A CİHAZI: TEKLİF
    document.getElementById('offerBtn').onclick = async () => {
        initPC();
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        statusDisplay.innerText = "Adresler toplanıyor (5sn)...";
        setTimeout(() => download("teklif.txt", pc.localDescription.sdp), 5000);
    };

    // DOSYA İÇE AKTAR (A veya B)
    document.getElementById('importFile').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const data = JSON.parse(ev.target.result);
            const sdp = atob(data.s);
            initPC();
            
            if (data.t === "offer") {
                // B Cihazı Teklif Aldı
                await pc.setRemoteDescription(new RTCSessionDescription({type: "offer", sdp}));
                document.getElementById('answerBtnArea').style.display = "block";
                statusDisplay.innerText = "Teklif dosyası yüklendi.";
            } else {
                // A Cihazı Yanıt Aldı
                await pc.setRemoteDescription(new RTCSessionDescription({type: "answer", sdp}));
                statusDisplay.innerText = "Yanıt dosyası yüklendi. Bağlanıyor...";
            }
        };
        reader.readAsText(file);
    };

    // B CİHAZI: YANIT
    document.getElementById('createAnswerBtn').onclick = async () => {
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        statusDisplay.innerText = "Yanıt hazırlanıyor (5sn)...";
        setTimeout(() => download("yanit.txt", pc.localDescription.sdp), 5000);
    };

    // BAS KONUŞ MANTIĞI
    function setMic(active) {
        if (!localTrack) return;
        localTrack.enabled = active;
        if (active) {
            pttButton.classList.add('active');
            pttButton.innerText = "YAYINDA...";
            statusDisplay.innerText = "KONUŞUYORSUNUZ (TX)";
            statusDisplay.className = "status-box status-tx";
        } else {
            pttButton.classList.remove('active');
            pttButton.innerText = "BAS KONUŞ";
            statusDisplay.innerText = "DİNLEMEDESİNİZ (RX)";
            statusDisplay.className = "status-box status-online";
        }
    }

    pttButton.addEventListener('mousedown', () => setMic(true));
    pttButton.addEventListener('mouseup', () => setMic(false));
    pttButton.addEventListener('touchstart', (e) => { e.preventDefault(); setMic(true); });
    pttButton.addEventListener('touchend', (e) => { e.preventDefault(); setMic(false); });

</script>
</body>
</html>

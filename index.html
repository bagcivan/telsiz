<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parçalı QR İnterkom</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 15px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-blue { background: #007bff; color: white; }
        .btn-pink { background: #e91e63; color: white; }
        .btn-green { background: #28a745; color: white; }
        #status { margin: 15px 0; padding: 10px; border: 1px solid #333; border-radius: 8px; color: #0f0; min-height: 24px; }
        #qrcode { background: white; padding: 15px; display: inline-block; margin-top: 10px; border-radius: 10px; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📟 Parçalı QR Telsiz</h2>
    <div id="status">Mikrofon bekleniyor...</div>
    
    <button id="initBtn" class="btn-blue">1. Mikrofonu Başlat</button>

    <div id="controls" style="display:none;">
        <button id="makeBtn" class="btn-pink">2. Teklif Oluştur (A Cihazı)</button>
        <button id="scanBtn" class="btn-green">3. Tara (B Cihazı)</button>
        
        <div id="qr-container" style="display:none;">
            <p id="qr-index">Parça: 1 / 4</p>
            <div id="qrcode"></div>
            <button id="nextQR" class="btn-blue">Sonraki Parçaya Geç ➡</button>
        </div>

        <div id="reader" style="display:none;"></div>
    </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<script>
    let pc, localStream;
    let chunksToSend = [];
    let currentChunkIndex = 0;
    let receivedChunks = {};
    let totalChunksToReceive = 0;

    const status = document.getElementById('status');
    const qrcodeDiv = document.getElementById('qrcode');

    // 1. MİKROFON
    document.getElementById('initBtn').onclick = async () => {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            status.innerText = "Hazır ✅";
            document.getElementById('controls').style.display = "block";
            document.getElementById('initBtn').style.display = "none";
        } catch (e) { status.innerText = "Hata: Mikrofon izni!"; }
    };

    function initPC() {
        pc = new RTCPeerConnection({ iceServers: [] });
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        pc.ontrack = e => {
            document.getElementById('remoteAudio').srcObject = e.streams[0];
            status.innerText = "BAĞLANDI 🔊";
        };
    }

    // VERİYİ PARÇALARA BÖL (Her parça ~200 karakter)
    function prepareChunks(type, sdp) {
        const fullData = JSON.stringify({t: type, s: sdp});
        const size = 200;
        const numChunks = Math.ceil(fullData.length / size);
        chunksToSend = [];
        for (let i = 0; i < numChunks; i++) {
            // Format: [Sıra/Toplam|Veri]
            chunksToSend.push(`${i + 1}/${numChunks}|${fullData.substr(i * size, size)}`);
        }
        currentChunkIndex = 0;
        showNextChunk();
    }

    function showNextChunk() {
        if (currentChunkIndex < chunksToSend.length) {
            document.getElementById('qr-container').style.display = "block";
            document.getElementById('qr-index').innerText = `Parça: ${currentChunkIndex + 1} / ${chunksToSend.length}`;
            qrcodeDiv.innerHTML = "";
            new QRCode(qrcodeDiv, { text: chunksToSend[currentChunkIndex], width: 250, height: 250 });
            
            if (currentChunkIndex === chunksToSend.length - 1) {
                document.getElementById('nextQR').innerText = "Tüm Parçalar Gösterildi";
            } else {
                document.getElementById('nextQR').innerText = "Sonraki Parçaya Geç ➡";
            }
        }
    }

    document.getElementById('nextQR').onclick = () => {
        currentChunkIndex++;
        if (currentChunkIndex < chunksToSend.length) showNextChunk();
    };

    // A CİHAZI: TEKLİF
    document.getElementById('makeBtn').onclick = async () => {
        initPC();
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        status.innerText = "Teklif parçalanıyor...";
        setTimeout(() => prepareChunks("offer", pc.localDescription.sdp), 1000);
    };

    // B CİHAZI: TARAMA
    document.getElementById('scanBtn').onclick = () => {
        const readerEl = document.getElementById('reader');
        readerEl.style.display = "block";
        receivedChunks = {};
        const scanner = new Html5Qrcode("reader");
        
        scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, async (text) => {
            const parts = text.split('|');
            const info = parts[0].split('/');
            const index = info[0];
            const total = info[1];
            const data = parts[1];

            if (!receivedChunks[index]) {
                receivedChunks[index] = data;
                status.innerText = `Alınıyor: ${Object.keys(receivedChunks).length} / ${total}`;
                
                if (Object.keys(receivedChunks).length == total) {
                    await scanner.stop();
                    readerEl.style.display = "none";
                    status.innerText = "Veri birleştiriliyor...";
                    assembleAndProcess();
                }
            }
        });
    };

    async function assembleAndProcess() {
        let fullStr = "";
        const total = Object.keys(receivedChunks).length;
        for (let i = 1; i <= total; i++) fullStr += receivedChunks[i];
        
        const signal = JSON.parse(fullStr);
        if (!pc) initPC();

        await pc.setRemoteDescription(new RTCSessionDescription({type: signal.t, sdp: signal.s}));

        if (signal.t === "offer") {
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            prepareChunks("answer", pc.localDescription.sdp);
            status.innerText = "Yanıt oluşturuldu, parçaları A'ya taratın.";
        } else {
            status.innerText = "Bağlantı tamamlandı!";
        }
    }
</script>
</body>
</html>
